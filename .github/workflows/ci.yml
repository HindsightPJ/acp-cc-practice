name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # P1-2: Ubuntu 跑非 GUI 单元/集成测试，覆盖多 Python 版本
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ --tb=short -q

      - name: Run tests with coverage
        run: python -m pytest tests/ --cov --cov-report=term-missing -q

  # P1-2: Windows 跑 GUI 冒烟测试（项目主场景是 Windows tkinter 桌面应用）
  # Ubuntu 无 display，无法跑 tkinter GUI 测试；Windows runner 自带桌面。
  test-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit/integration tests (non-GUI)
        run: python -m pytest tests/ --tb=short -q

      - name: Run GUI smoke tests
        run: python -m pytest tests/ -m gui --tb=short -v
